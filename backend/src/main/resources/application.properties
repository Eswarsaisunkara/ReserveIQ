# ==============================================================
# ReserveIQ - Spring Boot Configuration File
# ==============================================================
# 
# 📖 HOW TO READ THIS FILE:
#    ${VARIABLE_NAME:default-value}
#    means: "Use the environment variable if it exists, 
#            otherwise use the default-value after the colon (:)"
#
# 👉 FOR LOCAL DEVELOPMENT (on your laptop):
#    You only need to change 3 things (marked with ⬇️ CHANGE below):
#    1. Database name in the URL
#    2. Your MySQL username
#    3. Your MySQL password
# ==============================================================

# ---- Server Port ----
# The backend runs on port 8080 → http://localhost:8080
server.port=8080
server.servlet.context-path=/

# ==============================================================
# DATABASE CONNECTION  ⬇️ CHANGE THESE 3 LINES FOR YOUR LOCAL DB
# ==============================================================

# Line 1: Database URL
#   - "localhost:3306" = MySQL is running on your computer, port 3306
#   - "/reserveiq"     = the NAME of your database (change if you named it differently)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/reserveiq?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}

# Line 2: Your MySQL username (usually "root" for local installs)
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}

# Line 3: Your MySQL password  ⚠️ Put YOUR real password here
#         (for XAMPP/local default it is often empty "" or "root" or "password")
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

# MySQL driver (don't change this)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# JPA / Hibernate (Automatically creates tables for you!)
# ==============================================================
# Show SQL queries in the console (set to true while learning)
spring.jpa.show-sql=true
# "update" = Hibernate auto-creates/updates tables from your Java entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==============================================================
# JWT Authentication Secret & Token Lifetime
# ==============================================================
jwt.secret=${JWT_SECRET:8fbc2e790b12bc1a8e9e4f2a74c1001a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e}
# Token valid for 24 hours (in milliseconds)
jwt.expiration-ms=86400000

# ==============================================================
# Swagger UI (API Testing in Browser)
# Open → http://localhost:8080/swagger-ui.html
# ==============================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
